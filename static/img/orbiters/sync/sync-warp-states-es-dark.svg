        <text x="20" y="356" font-size="10.5" fill="#888">Las filas 3 y 4 comparten el pulso: con Warp activado cada nota se ancla a él; con Warp apagado mantiene su duración natural.</text>
        <text x="20" y="370" font-size="10.5" fill="#888">Las filas 1 y 2 no están sincronizadas: con Warp activado siguen el tempo propio del reproductor; con Warp apagado no hay rejilla.</text>
